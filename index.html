<!DOCTYPE html>
<html>
<head>
    <title>Environment Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="container">

    <h1>Environment Quiz</h1>

    <input
        type="text"
        id="name"
        placeholder="Enter Name">

    <br><br>

    <input
        type="text"
        id="studentClass"
        placeholder="Enter Class">

    <br><br>

    <button id="startBtn">
        Start Quiz
    </button>

</div>

<div id="quizScreen" style="display:none" class="container">

    <h2 id="question"></h2>

    <div id="options"></div>

    <h3>
        Time Left:
        <span id="timer">15</span>
    </h3>

    <button id="nextBtn">
        Next
    </button>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
